<!DOCTYPE html>
<html>
<head>
    <title>Evaluasi Nilai Huruf - JavaScript Dasar</title>
</head>
<body>
    <h1>Hasil Evaluasi Nilai</h1>

    <script language="JavaScript">
        <!--
        // 1. Mengambil input dari user menggunakan prompt
        var nilai = prompt("Masukkan Nilai Ujian (0-100): ", 0);
        
        // Konversi input string ke integer agar perhitungan akurat
        nilai = parseInt(nilai);

        var hasil;

        // 2. Logika evaluasi menggunakan pernyataan IF...ELSE IF
        if (nilai >= 80 && nilai <= 100) {
            hasil = "A";
        } else if (nilai >= 65 && nilai <= 79) {
            hasil = "B";
        } else if (nilai >= 40 && nilai <= 64) {
            hasil = "C";
        } else if (nilai >= 21 && nilai <= 39) {
            hasil = "D";
        } else if (nilai >= 0 && nilai <= 20) {
            hasil = "E";
        } else {
            hasil = "[Nilai tidak valid/di luar jangkauan]";
        }

        // 3. Menampilkan hasil ke halaman web
        document.write("Nilai  Anda: " + nilai + "<br>");
        document.write("<strong>Predikat : " + hasil + "</strong>");
        // -->
    </script>
</body>
</html>
